<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer | Ultra-Fast</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            font-family: 'Inter', -apple-system, sans-serif;
            overflow-x: hidden;
        }

        #viewer-container {
            width: 100vw;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .pdf-page-container {
            position: relative;
            margin-bottom: 2px;
            width: 100%;
            display: flex;
            justify-content: center;
            background: #1e293b;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        canvas {
            display: block;
            width: 100% !important;
            height: auto !important;
        }

        #loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }

        #loading-overlay.hidden {
            opacity: 0;
            visibility: hidden;
        }

        .loader {
            width: 48px;
            height: 48px;
            border: 3px solid var(--text-color);
            border-bottom-color: var(--accent-color);
            border-radius: 50%;
            display: inline-block;
            box-sizing: border-box;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .loading-text {
            margin-top: 1rem;
            color: var(--text-color);
            font-size: 0.875rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* Hide scrollbar but keep functionality */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-color);
        }
    </style>
</head>

<body>

    <div id="loading-overlay">
        <span class="loader"></span>
        <div class="loading-text">Optimizing Experience...</div>
    </div>

    <div id="viewer-container"></div>

    <script type="module">
        import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/+esm';

        // Configure Worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs';

        // CONFIGURATION: Replace with your direct PDF URL
        // Recommended: Cloudflare R2 or Supabase URL
        const PDF_URL = 'https://huggingface.co/datasets/UtkarshDugar/files/resolve/main/portfolio%202026_Aastha%20Charde%201%20(1).pdf';

        const container = document.getElementById('viewer-container');
        const loadingOverlay = document.getElementById('loading-overlay');

        async function renderPDF() {
            try {
                // Initialize PDF loading with range requests for speed
                const loadingTask = pdfjsLib.getDocument({
                    url: PDF_URL,
                    disableAutoFetch: true,  // Use range requests
                    disableStream: false
                });

                const pdf = await loadingTask.promise;
                loadingOverlay.classList.add('hidden');

                for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
                    const pageContainer = document.createElement('div');
                    pageContainer.className = 'pdf-page-container';
                    pageContainer.id = `page-${pageNum}`;
                    container.appendChild(pageContainer);

                    // Lazy load pages using IntersectionObserver
                    observePage(pageContainer, pdf, pageNum);
                }
            } catch (error) {
                console.error('Error loading PDF:', error);
                document.querySelector('.loading-text').innerText = 'Failed to load PDF. Check CORS/URL.';
            }
        }

        function observePage(element, pdf, pageNum) {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        renderPage(element, pdf, pageNum);
                        observer.unobserve(element); // Only render once
                    }
                });
            }, { rootMargin: '500px' });

            observer.observe(element);
        }

        async function renderPage(container, pdf, pageNum) {
            const page = await pdf.getPage(pageNum);

            // Calculate scale for "Fill Width"
            const viewport = page.getViewport({ scale: 1 });
            const screenWidth = window.innerWidth;
            const scale = screenWidth / viewport.width;
            const scaledViewport = page.getViewport({ scale: scale });

            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.height = scaledViewport.height;
            canvas.width = scaledViewport.width;

            container.appendChild(canvas);

            const renderContext = {
                canvasContext: context,
                viewport: scaledViewport
            };

            await page.render(renderContext).promise;
        }

        if (PDF_URL !== 'YOUR_DIRECT_PDF_URL_HERE') {
            renderPDF();
        } else {
            document.querySelector('.loading-text').innerText = 'Please set your PDF_URL in the script.';
        }

        // Handle window resize to maintain "Fill Width"
        window.addEventListener('resize', () => {
            // Optional: Re-render or just let CSS scale handle it if using canvas width 100%
            // For true crispness on resize, a re-render is better but expensive.
            // Using CSS width: 100% is a good compromise for now.
        });
    </script>
</body>

</html>
